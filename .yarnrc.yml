approvedGitRepositories:
  - "**"

enableScripts: true

# Default `node-modules` linker (formerly `pnpm`). Yarn's pnpm-style
# linker creates strict per-package node_modules trees that broke
# vite's react dedupe under workspaces — @base-ui/react would resolve
# a different `react` than the SSR renderer, throwing "Cannot read
# properties of null (reading 'useRef')". Plain hoisted node_modules
# avoids the duplication; vite's `resolve.dedupe` handles the rest.
nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.14.1.cjs
